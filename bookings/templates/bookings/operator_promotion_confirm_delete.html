{% extends "base.html" %}

{% block title %}Удаление акции{% endblock %}

{% block content %}
<section class="card">
    <div class="page-kicker">Подтверждение действия</div>
    <div class="info-grid">
        <div class="info-item">
            <span class="info-label">Акция</span>
            <strong>{{ promotion.name }}</strong>
        </div>
    </div>
    <form method="post" style="margin-top: 1.5rem;">
        {% csrf_token %}
        <div class="panel-actions">
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'operator_promotion_list' %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</section>
{% endblock %}
