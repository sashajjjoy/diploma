{% extends "base.html" %}
{% block title %}Удалить акцию{% endblock %}
{% block content %}
<div class="card">
    <h2>Удалить акцию «{{ promotion.name }}»?</h2>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'operator_promotion_list' %}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
