{% extends "base.html" %}

{% block title %}Удаление блюда из предзаказа{% endblock %}

{% block content %}
<div class="card">
    <h2>Удаление блюда из предзаказа</h2>
    <p>Вы уверены, что хотите удалить блюдо "{{ reservation_dish.dish.name }}" из предзаказа?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'reservation_detail' reservation.pk %}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
