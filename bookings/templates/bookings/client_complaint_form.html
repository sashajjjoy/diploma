{% extends "base.html" %}

{% block title %}Жалоба{% endblock %}

{% block content %}
<section class="card hero-card">
    <div class="page-kicker">Обратная связь</div>
    <h1 class="page-title">Жалоба на заведение</h1>
    <p class="page-subtitle">Опиши проблему подробно: тема, ситуация и любые детали, которые помогут оператору быстрее отреагировать.</p>
</section>

<section class="card">
    <form method="post" class="stack-md">
        {% csrf_token %}
        <div class="form-group">
            <label for="subject">Тема</label>
            <input type="text" id="subject" name="subject" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="message">Текст обращения</label>
            <textarea id="message" name="message" rows="6" class="form-control" required></textarea>
        </div>
        <div class="panel-actions">
            <button type="submit" class="btn btn-success">Отправить</button>
            <a href="{% url 'client_complaint_list' %}" class="btn btn-secondary">Мои жалобы</a>
        </div>
    </form>
</section>
{% endblock %}
