{% extends "base.html" %}
{% block title %}Жалоба{% endblock %}
{% block content %}
<div class="card">
    <h2>Жалоба на заведение</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Тема</label>
            <input type="text" name="subject" required style="width:100%;max-width:480px;padding:0.5rem;">
        </div>
        <div class="form-group">
            <label>Текст</label>
            <textarea name="message" rows="6" required style="width:100%;max-width:640px;padding:0.5rem;"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Отправить</button>
        <a href="{% url 'client_complaint_list' %}" class="btn">Мои жалобы</a>
    </form>
</div>
{% endblock %}
