{% extends "base.html" %}
{% block title %}{% if action == 'create' %}Новая новость{% else %}Редактирование{% endif %}{% endblock %}
{% block content %}
<div class="card">
    <h2>{% if action == 'create' %}Новая новость{% else %}Редактировать новость{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Заголовок</label>
            <input type="text" name="title" class="form-control" style="width:100%;padding:0.5rem;" required
                   value="{{ news_item.title|default:'' }}">
        </div>
        <div class="form-group">
            <label>Кратко</label>
            <input type="text" name="summary" class="form-control" style="width:100%;padding:0.5rem;"
                   value="{{ news_item.summary|default:'' }}">
        </div>
        <div class="form-group">
            <label>Текст</label>
            <textarea name="body" rows="8" style="width:100%;padding:0.5rem;" required>{{ news_item.body|default:'' }}</textarea>
        </div>
        <div class="form-group">
            <label>Дата и время публикации</label>
            <input type="datetime-local" name="published_at_local" style="padding:0.5rem;"
                   value="{% if news_item %}{{ news_item.published_at|date:'Y-m-d\TH:i' }}{% endif %}">
        </div>
        <label><input type="checkbox" name="is_published" {% if news_item %}{% if news_item.is_published %}checked{% endif %}{% else %}checked{% endif %}> Опубликовано</label>
        <p style="margin-top:1rem;">
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="{% url 'operator_news_list' %}" class="btn">Отмена</a>
        </p>
    </form>
</div>
{% endblock %}
