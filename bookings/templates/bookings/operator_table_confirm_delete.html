{% extends "base.html" %}

{% block title %}Удаление столика{% endblock %}

{% block content %}
<div class="card">
    <h2>Удаление столика</h2>
    <p>Вы уверены, что хотите удалить столик №{{ table.table_number }}?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'operator_table_detail' table.pk %}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
