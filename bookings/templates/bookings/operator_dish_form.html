{% extends "base.html" %}

{% block title %}{% if action == 'edit' %}Редактирование блюда{% else %}Создание блюда{% endif %}{% endblock %}

{% block content %}
<section class="card">
    <div class="page-kicker">Форма блюда</div>
    <form method="post" enctype="multipart/form-data" class="stack-md">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Название</label>
            <input type="text" name="name" id="name" class="form-control" value="{% if dish %}{{ dish.name }}{% endif %}" required>
        </div>
        <div class="form-group">
            <label for="description">Описание</label>
            <textarea name="description" id="description" class="form-control" rows="4">{% if dish %}{{ dish.description }}{% endif %}</textarea>
        </div>
        <div class="form-grid form-grid-2">
            <div class="form-group">
                <label for="price">Цена (₽)</label>
                <input type="number" name="price" id="price" class="form-control" value="{% if dish %}{{ dish.price }}{% else %}0.00{% endif %}" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="available_quantity">Доступное количество</label>
                <input type="number" name="available_quantity" id="available_quantity" class="form-control" value="{% if dish %}{{ dish.available_quantity }}{% else %}0{% endif %}" min="0" required>
            </div>
        </div>
        <div class="form-group">
            <label for="image">Изображение</label>
            <input type="file" name="image" id="image" class="form-control" accept="image/*">
        </div>
        {% if dish and dish.image %}
        <div class="card card-soft" style="max-width: 280px;">
            <img src="{{ dish.image.url }}" alt="{{ dish.name }}" style="border-radius: 16px; max-height: 220px; object-fit: cover;">
        </div>
        {% endif %}
        <div class="panel-actions">
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="{% if dish %}{% url 'operator_dish_detail' dish.pk %}{% else %}{% url 'operator_dishes' %}{% endif %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</section>
{% endblock %}
