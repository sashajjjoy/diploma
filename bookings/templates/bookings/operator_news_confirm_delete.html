{% extends "base.html" %}
{% block title %}Удалить новость{% endblock %}
{% block content %}
<div class="card">
    <h2>Удалить новость?</h2>
    <p>{{ news_item.title }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'operator_news_list' %}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
