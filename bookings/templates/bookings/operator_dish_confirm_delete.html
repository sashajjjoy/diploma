{% extends "base.html" %}

{% block title %}Удаление блюда{% endblock %}

{% block content %}
<div class="card">
    <h2>Удаление блюда</h2>
    <p>Вы уверены, что хотите удалить блюдо "{{ dish.name }}"?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'operator_dish_detail' dish.pk %}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
