{% extends "base.html" %}

{% block title %}Удаление блюда{% endblock %}

{% block content %}
<section class="card hero-card">
    <div class="page-kicker">Подтверждение действия</div>
    <h1 class="page-title">Удаление блюда</h1>
    <p class="page-subtitle">Подтвердите удаление блюда. Если оно участвует в меню или заказах, сначала проверьте связанные данные.</p>
</section>

<section class="card">
    <div class="info-grid">
        <div class="info-item">
            <span class="info-label">Блюдо</span>
            <strong>{{ dish.name }}</strong>
        </div>
    </div>
    <form method="post" style="margin-top: 1.5rem;">
        {% csrf_token %}
        <div class="panel-actions">
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'operator_dish_detail' dish.pk %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</section>
{% endblock %}
